name = "nomad-counter-api"
main = "src/index.ts"
compatibility_date = "2026-04-26"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "nomad-counter-db"
database_id = "8d8d0917-8c69-4b53-8875-dcbabd640aaf"
migrations_dir = "migrations"

[vars]
ALLOWED_ORIGINS = "http://localhost:4321,https://nomad.santi020k.com,https://nomad-counter.pages.dev,https://5e9f6473.nomad-counter.pages.dev"
SESSION_COOKIE_NAME = "nomad_session"
AUTH_EMAIL_FROM = "Nomad Counter <login@nomad.santi020k.com>"

# Local development values are loaded from apps/api/.dev.vars.
# Production secret is set with:
#   pnpm --filter @nomad-counter/api exec wrangler secret put RESEND_API_KEY

[dev]
port = 8787
local_protocol = "http"
