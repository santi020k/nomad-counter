name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
        with:
          version: 10.32.1
      - uses: actions/setup-node@v5
        with:
          node-version-file: .node-version
          cache: pnpm
          package-manager-cache: false
      - run: pnpm install --frozen-lockfile
      - run: pnpm spellcheck
      - run: pnpm knip
      - run: pnpm turbo run lint check

  test:
    name: E2E
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
        with:
          version: 10.32.1
      - uses: actions/setup-node@v5
        with:
          node-version-file: .node-version
          cache: pnpm
          package-manager-cache: false
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @nomad-counter/web exec playwright install chromium --with-deps
      - run: pnpm turbo run test --filter=@nomad-counter/web
        env:
          PUBLIC_API_URL: https://api.nomad.santi020k.com

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
        with:
          version: 10.32.1
      - uses: actions/setup-node@v5
        with:
          node-version-file: .node-version
          cache: pnpm
          package-manager-cache: false
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run build
        env:
          PUBLIC_API_URL: https://api.nomad.santi020k.com

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [build, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
        with:
          version: 10.32.1
      - uses: actions/setup-node@v5
        with:
          node-version-file: .node-version
          cache: pnpm
          package-manager-cache: false
      - run: pnpm install --frozen-lockfile
      - name: Configure D1 id
        run: |
          test -n "$CLOUDFLARE_D1_DATABASE_ID"
          sed -i "s/database_id = .*/database_id = \"${CLOUDFLARE_D1_DATABASE_ID}\"/" apps/api/wrangler.toml
        env:
          CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
      - run: pnpm run deploy
        env:
          PUBLIC_API_URL: https://api.nomad.santi020k.com
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
