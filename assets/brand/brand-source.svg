<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520">
  <title>Nomad Counter editable brand source</title>
  <defs>
    <style>
      .label{font:700 18px Inter,Arial,sans-serif;fill:#6b7280}.word{font:800 48px Inter,Arial,sans-serif}
    </style>
  </defs>
  <rect width="900" height="520" fill="#F8FAFC"/>
  <text x="40" y="56" class="label">Logo master - calendar dots + 183 counter</text>
  <g transform="translate(40 88)">
    <rect width="128" height="128" rx="28" fill="#471AA0" />
    <rect x="36" y="36" width="22" height="22" rx="6" fill="#FFFFFF" fill-opacity="0.95" />
    <rect x="70" y="36" width="22" height="22" rx="6" fill="#FFFFFF" fill-opacity="0.6" />
    <rect x="36" y="70" width="22" height="22" rx="6" fill="#FFFFFF" fill-opacity="0.3" />
    <rect x="70" y="70" width="22" height="22" rx="6" fill="#EAB308" />
  </g>
  <text x="200" y="166" class="word" fill="#1F2937" letter-spacing="-0.04em">Nomad <tspan fill="#471AA0" font-weight="600" letter-spacing="-0.02em">Counter</tspan></text>
  <text x="40" y="292" class="label">Palette from Figma: primary violet, lavender, off-white app surface, gray UI, status accents</text>
  <rect x="40" y="320" width="100" height="100" fill="#471AA0"/><rect x="160" y="320" width="100" height="100" fill="#804BC4"/><rect x="280" y="320" width="100" height="100" fill="#B579E6"/><rect x="400" y="320" width="100" height="100" fill="#F8FAFC"/><rect x="520" y="320" width="100" height="100" fill="#1F2937"/><rect x="640" y="320" width="100" height="100" fill="#EAB308"/><rect x="760" y="320" width="100" height="100" fill="#14B8A6"/>
</svg>
